name: Deploy Resume to AWS

on:
  push:
    branches:
      - main  # Runs every time you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1 # Change to your bucket region

      - name: Sync to S3
        run: |
          aws s3 sync . s3://shashank-resume-static-2026 --exclude ".git/*" --exclude ".github/*"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id E2HZOAQW2HJZ9K --paths "/*"
